<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spanish Founders — Coming soon</title>
<meta name="description" content="The bridge to Silicon Valley. Coming soon." />
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', sans-serif;
    background: #0a0a0c;
    color: white;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-weight: 300;
    line-height: 1.4;
  }

  .stage {
    position: relative;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Photo background with Ken Burns effect */
  .photo {
    position: absolute;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }
  .photo::before {
    content: '';
    position: absolute;
    inset: -8%;
    background-image: url('https://images.unsplash.com/photo-1501594907352-04cda38ebc29?auto=format&fit=crop&w=2400&q=80');
    background-size: cover;
    background-position: center;
    filter: grayscale(100%) contrast(1.05) brightness(0.55);
    animation: kenBurns 32s ease-out infinite alternate;
  }
  .photo-overlay {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 50%, rgba(10, 10, 12, 0.3) 0%, rgba(10, 10, 12, 0.85) 100%),
      linear-gradient(180deg, rgba(10, 10, 12, 0.4) 0%, rgba(10, 10, 12, 0.6) 50%, rgba(10, 10, 12, 0.95) 100%);
  }
  @keyframes kenBurns {
    0%   { transform: scale(1.05) translate(0, 0); }
    100% { transform: scale(1.18) translate(-2%, -1%); }
  }

  /* Content */
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 0 24px;
    max-width: 720px;
    animation: fadeIn 1.4s ease-out;
  }
  .name {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 300;
    letter-spacing: 0.01em;
    color: rgba(255, 255, 255, 0.95);
    margin-bottom: 24px;
  }
  .name strong {
    font-weight: 500;
  }
  .divider {
    width: 40px;
    height: 1px;
    background: rgba(255, 255, 255, 0.25);
    margin: 0 auto 28px;
  }
  .coming {
    font-size: clamp(48px, 9vw, 88px);
    font-weight: 200;
    letter-spacing: -0.03em;
    line-height: 1;
    background: linear-gradient(135deg, #2997ff 0%, #a78bfa 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .tagline {
    margin-top: 36px;
    font-size: clamp(13px, 1.5vw, 15px);
    color: rgba(255, 255, 255, 0.45);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 400;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="photo">
      <div class="photo-overlay"></div>
    </div>
    <div class="content">
      <div class="name">Spanish <strong>Founders</strong></div>
      <div class="divider"></div>
      <div class="coming">Coming soon</div>
      <div class="tagline">The bridge to Silicon Valley</div>
    </div>
  </div>
</body>
</html>
